<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 이미지 분류 - 카테고리 인식</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .class-container { max-width: 800px; margin: 0 auto; }
        .result-panel { background: var(--card-bg); backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 2rem; padding: 2.5rem; margin-top: 2rem; text-align: center; }
        .label-badge { display: inline-block; padding: 0.8rem 2rem; background: var(--primary); color: white; border-radius: 3rem; font-weight: 800; font-size: 1.5rem; margin-top: 1.5rem; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4); }
        .back-link { display: inline-flex; align-items: center; color: var(--text-muted); text-decoration: none; margin-bottom: 2rem; font-weight: 600; transition: color 0.2s ease; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="container class-container">
        <a href="/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            허브로 돌아가기
        </a>
        <header>
            <h1>AI 이미지 분류</h1>
            <p>PyTorch 및 MobileNet V3 Small 모델로 이미지 속 주요 객체를 1,000가지 이상의 카테고리로 분류합니다.</p>
        </header>

        <div class="result-panel">
            <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <div id="upload-prompt">
                    <p style="font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem;">이미지를 업로드하세요</p>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">업로드한 이미지가 어떤 카테고리인지 분류합니다</p>
                </div>
                <input type="file" id="file-input" accept="image/*" style="display:none">
            </div>

            <button class="btn" id="process-btn" style="margin-top: 1.5rem;">이미지 분류하기</button>
            <div id="error-msg" class="error" style="margin-top: 1rem; text-align: center; display: none;"></div>
            <div class="spinner" id="loading-spinner" style="margin-top: 2rem;"></div>

            <div id="result-display" style="margin-top: 2.5rem; display: none;">
                <p style="color: var(--text-muted); font-size: 1.1rem;">가장 높은 확률로 예측된 카테고리:</p>
                <div id="result-label" class="label-badge">CATEGORY</div>
            </div>
        </div>
    </div>
    <script>
        const fileInput = document.getElementById('file-input');
        const processBtn = document.getElementById('process-btn');
        const resultDisplay = document.getElementById('result-display');
        const resultLabel = document.getElementById('result-label');
        const spinner = document.getElementById('loading-spinner');
        const errorMsg = document.getElementById('error-msg');

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (file) {
                 document.getElementById('upload-prompt').innerHTML = `<p style="font-size:1.1rem; color:var(--primary); font-weight:700;">${file.name}</p>`;
            }
        });

        processBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) { alert('이미지를 선택해주세요.'); return; }
            errorMsg.style.display = 'none'; resultDisplay.style.display = 'none'; spinner.style.display = 'block';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/image-classification/api/process', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.status === 'success') {
                    resultLabel.textContent = data.label.replace(/_/g, ' ').toUpperCase();
                    resultDisplay.style.display = 'block';
                    resultDisplay.scrollIntoView({ behavior: 'smooth' });
                } else {
                    errorMsg.textContent = '분석에 실패했습니다.';
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                errorMsg.textContent = '서버 통신 오류가 발생했습니다.';
                errorMsg.style.display = 'block';
            } finally {
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
