<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Selfie Segmentation - AI Hub</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        .selfie-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .control-panel {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 2.5rem;
            margin-top: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .slider-group {
            margin: 2rem 0;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            color: var(--text-muted);
            font-weight: 600;
        }
        input[type=range] {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            appearance: none;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s ease;
            box-shadow: 0 0 15px var(--primary);
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        .preview-area {
            position: relative;
            width: 100%;
            min-height: 400px;
            background: rgba(15, 23, 42, 0.4);
            border: 2px dashed var(--glass-border);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-top: 2rem;
            transition: all 0.3s ease;
        }
        .preview-area img {
            max-width: 100%;
            max-height: 700px;
            border-radius: 1rem;
            display: none;
        }
        .preview-placeholder {
            text-align: center;
            color: var(--text-muted);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 2rem;
            font-weight: 600;
            transition: color 0.2s ease;
        }
        .back-link:hover {
            color: var(--primary);
        }
        .back-link svg {
            margin-right: 0.5rem;
        }
        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <div class="container selfie-container">
        <a href="/" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Hub
        </a>

        <header>
            <h1>AI Selfie Segmentation</h1>
            <p>고급 MediaPipe 모델을 사용하여 배경을 실시간으로 흐릿하게 처리합니다.</p>
        </header>

        <div class="control-panel">
            <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <div id="upload-prompt">
                    <p style="font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem;">이미지를 업로드하세요</p>
                    <p style="font-size: 0.9rem; color: var(--text-muted);">클릭하거나 드래그 앤 드롭</p>
                </div>
                <input type="file" id="file-input" accept="image/*" style="display:none">
            </div>

            <div class="slider-group">
                <div class="slider-label">
                    <span>배경 흐림 강도 (Blur Intensity)</span>
                    <span id="blur-value">21</span>
                </div>
                <input type="range" id="blur-slider" min="1" max="101" step="2" value="21">
            </div>

            <div class="action-btns">
                <button class="btn" id="process-btn">이미지 처리하기</button>
                <button class="btn" id="download-btn" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); display: none;">결과 저장</button>
            </div>

            <div id="error-msg" class="error" style="margin-top: 1rem; text-align: center; display: none;"></div>
            
            <div class="spinner" id="loading-spinner" style="margin-top: 2rem;"></div>

            <div class="preview-area" id="preview-area">
                <div class="preview-placeholder" id="placeholder-text">
                    <p>이미지를 업로드하면 결과가 여기에 표시됩니다.</p>
                </div>
                <img id="result-img" alt="Result Image">
            </div>
        </div>
    </div>

    <script src="/static/selfie_app.js"></script>
</body>
</html>
